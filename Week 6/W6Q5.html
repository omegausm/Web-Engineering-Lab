<!doctype html>
<html>
  <head>
    <title>Compose Mail</title>
    <style>
      body {
        font-family: Arial;
        background-color: #e6e6e6;
      }

      .container {
        width: 500px;
        margin: 50px auto;
        background: #d9d9d9;
        padding: 20px;
        border: 1px solid #999;
      }

      label {
        display: inline-block;
        width: 80px;
        font-weight: bold;
      }

      input,
      textarea {
        width: 300px;
        padding: 5px;
        margin-bottom: 10px;
      }

      textarea {
        height: 100px;
      }

      .btn {
        margin-left: 90px;
        padding: 8px 20px;
        font-size: 16px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <form>
        <div>
          <label>To</label>
          <input type="text" name="to" />
        </div>

        <div>
          <label>Copy</label>
          <input type="text" name="cc" />
        </div>

        <div>
          <label>Message</label>
          <textarea name="message"></textarea>
        </div>

        <input type="submit" value="SEND" class="btn" />
      </form>
    </div>
  </body>
</html>
